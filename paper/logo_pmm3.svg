<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2d6a9f"/>
    </linearGradient>
    <linearGradient id="curve1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#81d4fa"/>
    </linearGradient>
    <linearGradient id="curve2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="100%" stop-color="#ffab91"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.3"/>

  <!-- Grid lines (subtle) -->
  <line x1="24" y1="95" x2="104" y2="95" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <line x1="64" y1="25" x2="64" y2="95" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>

  <!-- Bimodal TN density curve (the distribution being studied) -->
  <path d="M 22,92 C 28,90 32,82 38,55 C 42,38 46,32 50,30 C 54,32 56,42 58,55 C 60,65 62,78 64,85 C 66,78 68,65 70,55 C 72,42 74,32 78,30 C 82,32 86,38 90,55 C 96,82 100,90 106,92"
        fill="none" stroke="url(#curve1)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- OLS Gaussian curve (wider, lower - dashed) -->
  <path d="M 22,92 C 30,90 38,85 46,72 C 52,62 58,54 64,50 C 70,54 76,62 82,72 C 90,85 98,90 106,92"
        fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,3" stroke-linecap="round" opacity="0.35"/>

  <!-- PMM3 arrow showing variance reduction -->
  <path d="M 78,42 L 72,36" fill="none" stroke="url(#curve2)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="71" cy="35" r="1.5" fill="#ff8a65"/>

  <!-- "g₃" label -->
  <text x="82" y="40" font-family="serif" font-size="11" font-weight="bold" fill="#ffab91" font-style="italic">g₃</text>

  <!-- PMM3 text at bottom -->
  <text x="64" y="113" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">PMM3</text>

  <!-- Small "3" polynomial dots representing moments -->
  <circle cx="36" cy="100" r="2" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="64" cy="100" r="2" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="92" cy="100" r="2" fill="#4fc3f7" opacity="0.6"/>
</svg>
